<!-- Ce fichier sert uniquement à Netlify pour détecter les formulaires à la build -->
<!-- Chaque formulaire dynamique du site doit être déclaré ici avec data-netlify="true" -->

<html>
<body>
  <form name="contact-audex" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text" name="nom" />
    <input type="email" name="courriel" />
    <input type="tel" name="telephone" />
    <select name="service"><option value=""></option></select>
    <textarea name="message"></textarea>
  </form>

  <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text" name="nom" />
    <input type="email" name="email" />
    <input type="tel" name="telephone" />
    <select name="sujet"><option value=""></option></select>
    <textarea name="message"></textarea>
  </form>
