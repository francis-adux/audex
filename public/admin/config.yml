backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

locale: fr

publish_mode: editorial_workflow

collections:
  - name: blog
    label: Articles de blogue
    label_singular: Article
    folder: src/content/blog
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    editor:
      preview: false
    fields:
      - { label: 'Titre', name: 'title', widget: 'string' }
      - { label: 'Description', name: 'description', widget: 'text' }
      - { label: 'Date de publication', name: 'publishDate', widget: 'datetime', format: 'YYYY-MM-DD' }
      - { label: 'Auteur', name: 'author', widget: 'string', default: 'Équipe' }
      - { label: 'Image', name: 'image', widget: 'image', required: false }
      - { label: 'Étiquettes', name: 'tags', widget: 'list', required: false }
      - { label: 'Brouillon', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Contenu', name: 'body', widget: 'markdown' }

  - name: landings
    label: Landing pages
    label_singular: Landing page
    folder: src/content/landings
    create: true
    slug: '{{slug}}'
    editor:
      preview: false
    fields:
      - { label: 'Titre SEO', name: 'title', widget: 'string' }
      - { label: 'Description SEO', name: 'description', widget: 'text' }
      - { label: 'Titre principal (hero)', name: 'heroTitle', widget: 'string' }
      - { label: 'Sous-titre (hero)', name: 'heroSubtitle', widget: 'text' }
      - { label: 'Texte du bouton CTA', name: 'ctaText', widget: 'string', default: 'Nous contacter' }
      - { label: 'Image', name: 'image', widget: 'image', required: false }
      - { label: 'Publié', name: 'published', widget: 'boolean', default: true }
      - { label: 'Contenu de la page', name: 'body', widget: 'markdown' }

  - name: pages
    label: Pages
    files:
      - name: home
        label: Page d'accueil
        file: src/content/pages/home.md
        fields:
          - { label: 'Titre', name: 'title', widget: 'string' }
          - { label: 'Description', name: 'description', widget: 'text' }
          - { label: 'Contenu', name: 'body', widget: 'markdown' }
