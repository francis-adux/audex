# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: francis-adux/audex
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/8dcc7b2d-6d86-4879-8a97-1dd6835a07e1/pkce
  auth_token_endpoint: /sites/8dcc7b2d-6d86-4879-8a97-1dd6835a07e1/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://audex-site.netlify.app

media_folder: public/images
public_folder: /images

locale: fr

publish_mode: editorial_workflow

collections:
  - name: blog
    label: Articles de blogue
    label_singular: Article
    folder: src/content/blog
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    editor:
      preview: false
    fields:
      - { label: 'Titre', name: 'title', widget: 'string' }
      - { label: 'Description', name: 'description', widget: 'text' }
      - { label: 'Date de publication', name: 'publishDate', widget: 'datetime', format: 'YYYY-MM-DD' }
      - { label: 'Auteur', name: 'author', widget: 'string', default: 'Équipe' }
      - { label: 'Image', name: 'image', widget: 'image', required: false }
      - { label: 'Étiquettes', name: 'tags', widget: 'list', required: false }
      - { label: 'Brouillon', name: 'draft', widget: 'boolean', default: false }
      - { label: 'Contenu', name: 'body', widget: 'markdown' }

  - name: landings
    label: Landing pages
    label_singular: Landing page
    folder: src/content/landings
    create: true
    slug: '{{slug}}'
    editor:
      preview: false
    fields:
      - { label: 'Titre SEO', name: 'title', widget: 'string' }
      - { label: 'Description SEO', name: 'description', widget: 'text' }
      - { label: 'Titre principal (hero)', name: 'heroTitle', widget: 'string' }
      - { label: 'Sous-titre (hero)', name: 'heroSubtitle', widget: 'text' }
      - { label: 'Texte du bouton CTA', name: 'ctaText', widget: 'string', default: 'Nous contacter' }
      - { label: 'Image', name: 'image', widget: 'image', required: false }
      - { label: 'Publié', name: 'published', widget: 'boolean', default: true }
      - { label: 'Contenu de la page', name: 'body', widget: 'markdown' }

  - name: pages
    label: Pages
    files:
      - name: home
        label: Page d'accueil
        file: src/content/pages/home.md
        fields:
          - { label: 'Titre', name: 'title', widget: 'string' }
          - { label: 'Description', name: 'description', widget: 'text' }
          - { label: 'Contenu', name: 'body', widget: 'markdown' }
